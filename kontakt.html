<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt – Krets</title>
  <link rel="icon" type="image/svg+xml" href="krets-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

<body>

  <!-- HEADER -->
  <header>
    <div class="container header-inner">
      <a href="index.html"><img src="krets-logo-main.png" alt="Krets" class="logo-img" /></a>
      <nav>
        <a href="kontakt.html" class="nav-link active">Kontakt</a>
      </nav>
    </div>
  </header>

  <!-- CONTACT -->
  <main><section class="contact-page">
    <div class="container">
      <h1>Kontakt oss</h1>
      <p class="contact-sub">Har du spørsmål eller vil vite mer om Krets? Ta gjerne kontakt.</p>
      <div class="contact-card">
        <div class="contact-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </div>
        <div>
          <p class="contact-label">E-post</p>
          <a href="mailto:kretsapp@gmail.com" class="contact-value">kretsapp@gmail.com</a>
        </div>
      </div>
    </div>
  </section></main>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>© 2026 Krets. Alle rettigheter forbeholdt.</p>
    </div>
  </footer>

</body>
