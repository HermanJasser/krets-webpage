  </defs>

  <!-- speed stripes -->
  <rect x="22" y="86" width="62" height="10" rx="5" fill="#C4AEFF" opacity="0.95"/>
  <rect x="6" y="110" width="74" height="10" rx="5" fill="#C4AEFF" opacity="0.85"/>
  <rect x="28" y="134" width="50" height="10" rx="5" fill="#C4AEFF" opacity="0.75"/>

  <!-- left pin -->
  <g transform="translate(118 110) rotate(-12)">
    <path d="M0 -62C-30 -62 -54 -38 -54 -8C-54 34 0 104 0 104C0 104 54 34 54 -8C54 -38 30 -62 0 -62Z" fill="url(#pinGrad)"/>
    <circle cx="0" cy="-12" r="22" fill="#F2F0FF"/>
